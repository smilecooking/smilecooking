<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Smile Cooking OGP Image</title>
  <desc id="desc">群馬県太田市の親子・子ども料理教室 スマイルクッキング</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4dbe6"/>
      <stop offset="48%" stop-color="#f9e4c6"/>
      <stop offset="100%" stop-color="#b8e5da"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#a88c82" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="36" fill="url(#bg)"/>
  <circle cx="1020" cy="110" r="140" fill="#ffffff" opacity="0.22"/>
  <circle cx="170" cy="520" r="180" fill="#ffffff" opacity="0.16"/>

  <g filter="url(#shadow)">
    <rect x="84" y="84" width="1032" height="462" rx="38" fill="#fffaf6" opacity="0.92"/>
  </g>

  <g transform="translate(132 136)">
    <rect x="0" y="0" width="224" height="56" rx="28" fill="#ffffff"/>
    <text x="112" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#d47095" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif">群馬県太田市</text>

    <text x="0" y="132" font-size="72" font-weight="800" fill="#3e2a1e" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif">料理を通して、</text>
    <text x="0" y="216" font-size="72" font-weight="800" fill="#3e2a1e" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif">子どもの</text>
    <text x="0" y="304" font-size="92" font-weight="900" fill="#3e2a1e" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif">「自分で決める力」</text>
    <rect x="0" y="318" width="640" height="18" rx="9" fill="#f5d98a" opacity="0.68"/>
    <text x="0" y="396" font-size="72" font-weight="800" fill="#3e2a1e" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif">を育てる。</text>

    <text x="0" y="468" font-size="34" font-weight="700" fill="#7a5c4e" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif">親子レッスン・小学生レッスン・体験レッスン</text>
  </g>

  <g transform="translate(912 414)">
    <circle cx="94" cy="54" r="54" fill="#06c755"/>
    <text x="94" y="64" text-anchor="middle" font-size="30" font-weight="800" fill="#ffffff" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif">LINE</text>
  </g>

  <text x="1048" y="116" text-anchor="end" font-size="34" font-weight="800" fill="#3e2a1e" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif">Smile Cooking</text>
</svg>
